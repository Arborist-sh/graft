name: Graft
options:
  bundleIdPrefix: dev.graft
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  GraftPackage:
    path: .

targets:
  Graft:
    type: application
    platform: macOS
    sources:
      - GraftBar
    dependencies:
      - package: GraftPackage
        product: GraftCore
    postBuildScripts:
      - name: Stamp git commit into Info.plist
        basedOnDependencyAnalysis: false
        script: |
          # Stamp the short commit hash into the (signing happens after this phase,
          # so the modified plist stays valid). Empty outside a git checkout.
          export PATH="/usr/bin:/bin:/usr/local/bin:$PATH"
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          COMMIT=$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || echo "")
          if [ -n "$COMMIT" ] && [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :GitCommit $COMMIT" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Add :GitCommit string $COMMIT" "$PLIST"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.graft.Graft
        PRODUCT_NAME: Graft
        DEVELOPMENT_TEAM: "27N85AU6XK"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        MARKETING_VERSION: "0.5.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Full app now: dock icon + Dashboard window (was LSUIElement/menu-bar-only). The
        # MenuBarExtra still shows in the menu bar regardless — best of both.
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_CFBundleDisplayName: Graft
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Brian Corbin"
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
        COMBINE_HIDPI_IMAGES: YES
